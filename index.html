<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAMINHO PARA A PROSPERIDADE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Rajdhani:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"></script>
    <style>
        :root {
            --gold: #C9A84C;
            --gold-light: #F0D080;
            --gold-dark: #8B6914;
            --obsidian: #0A0A0F;
            --charcoal: #12121A;
            --ink: #1C1C28;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--obsidian);
            overflow-x: hidden;
        }

        /* ── MONTH TRANSITION OVERLAY ── */
        #month-transition-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            pointer-events: none;
            display: none;
        }

        #month-transition-overlay.active {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .mto-curtain-left, .mto-curtain-right {
            position: absolute;
            top: 0; bottom: 0;
            width: 0;
            background: var(--obsidian);
            transition: width 0.45s cubic-bezier(0.77,0,0.18,1);
        }
        .mto-curtain-left { left: 0; }
        .mto-curtain-right { right: 0; }

        #month-transition-overlay.phase-close .mto-curtain-left,
        #month-transition-overlay.phase-close .mto-curtain-right {
            width: 52%;
        }

        .mto-content {
            position: relative;
            z-index: 10;
            text-align: center;
            opacity: 0;
            transform: scale(0.8);
            transition: opacity 0.3s ease 0.45s, transform 0.3s ease 0.45s;
        }
        #month-transition-overlay.phase-show .mto-content {
            opacity: 1;
            transform: scale(1);
        }

        .mto-month-label {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3rem, 10vw, 7rem);
            font-weight: 900;
            letter-spacing: 0.05em;
            background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
        }

        .mto-divider {
            width: 180px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 1rem auto;
        }

        .mto-tagline {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 1.1rem;
            color: rgba(201,168,76,0.7);
            letter-spacing: 0.15em;
        }

        /* Phase color shift on game screen */
        #screen-game { transition: background 1.2s ease; }

        /* ── HOME SCREEN ── */
        #screen-home {
            position: relative;
            overflow: hidden;
            min-height: 100vh;
            background: var(--obsidian);
        }

        .home-bg-layer {
            position: absolute;
            inset: 0;
            opacity: 0.3;
            filter: grayscale(0.2) brightness(0.6);
            background: url("https://images.unsplash.com/photo-1496442226666-8d4d0e62e6e9?q=80&w=2070&auto=format&fit=crop") center/cover no-repeat;
        }

        .home-bg-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to bottom,
                rgba(10,10,15,0.5) 0%,
                rgba(10,10,15,0.15) 40%,
                rgba(10,10,15,0.6) 70%,
                rgba(10,10,15,0.95) 100%
            );
        }

        .home-gold-line {
            width: 120px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 1rem auto;
        }

        .home-content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .home-eyebrow {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 0.4em;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .home-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 8vw, 4.5rem);
            font-weight: 900;
            line-height: 1.1;
            text-align: center;
            background: linear-gradient(135deg, #fff 0%, var(--gold-light) 50%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .home-subtitle {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 1.1rem;
            color: rgba(240,208,128,0.7);
            letter-spacing: 0.1em;
            text-align: center;
            margin-bottom: 0.5rem;
        }

        .city-badge-row {
            display: flex;
            gap: 1rem;
            margin: 1.5rem 0;
            align-items: center;
        }

        .city-badge {
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            border: 1px solid rgba(201,168,76,0.3);
            width: 90px;
            height: 55px;
        }

        .city-badge-label {
            position: absolute;
            bottom: 4px;
            left: 0; right: 0;
            text-align: center;
            font-size: 0.55rem;
            letter-spacing: 0.15em;
            color: var(--gold-light);
            text-transform: uppercase;
        }

        /* Buttons */
        .btn-luxury {
            position: relative;
            overflow: hidden;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 0.85rem 1.5rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .btn-luxury::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent);
            opacity: 0;
            transition: opacity 0.25s;
        }
        .btn-luxury:hover::before { opacity: 1; }
        .btn-luxury:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.4); }

        .btn-gold {
            background: linear-gradient(135deg, var(--gold-dark), var(--gold), var(--gold-light));
            color: var(--obsidian);
            border: none;
        }

        .btn-dark {
            background: rgba(255,255,255,0.05);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-dark:hover { border-color: var(--gold); color: var(--gold-light); }

        /* ── GAME SCREEN PHASES ── */
        .game-phase-1  { background: #0d1a2e; }
        .game-phase-2  { background: #0d1a2e; }
        .game-phase-3  { background: #0d1a2e; }
        .game-phase-4  { background: #0d1a2e; }
        .game-phase-5  { background: #0d1a2e; }
        .game-phase-6  { background: #0a0a0f; }
        .game-phase-7  { background: #0a0a0f; }
        .game-phase-8  { background: #0a0a0f; }
        .game-phase-9  { background: #0a0a0f; }
        .game-phase-10 { background: #0a0a0f; }
        .game-phase-11 { background: #0a1f0d; }
        .game-phase-12 { background: #0a1f0d; }
        .game-phase-13 { background: #0a1f0d; }
        .game-phase-14 { background: #0a1f0d; }
        .game-phase-15 { background: #0a1f0d; }
        .game-phase-16 { background: #0a1f0d; }
        .game-phase-17 { background: #0a1f0d; }
        .game-phase-18 { background: #0a1f0d; }
        .game-phase-19 { background: #0a1f0d; }
        .game-phase-20 { background: #0a1f0d; }
        .game-phase-21 { background: #1f0e00; }
        .game-phase-22 { background: #1f0e00; }
        .game-phase-23 { background: #1f0e00; }
        .game-phase-24 { background: #1f0e00; }

        /* Bar chart */
        .chart-bar-enter {
            animation: barGrow 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards;
        }
        @keyframes barGrow {
            from { height: 0 !important; opacity: 0; }
            to { opacity: 1; }
        }

        .luxury-card {
            background: rgba(18,18,26,0.8);
            border: 1px solid rgba(201,168,76,0.2);
            backdrop-filter: blur(10px);
            border-radius: 14px;
        }

        @keyframes slideInRight {
            from { transform: translateX(40px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes fadeUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .anim-slide-in { animation: slideInRight 0.5s cubic-bezier(0.25,0.46,0.45,0.94); }
        .anim-fade-up  { animation: fadeUp 0.5s ease forwards; }

        .month-ring {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: 2px solid var(--gold);
            background: rgba(201,168,76,0.08);
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--gold-light);
            box-shadow: 0 0 20px rgba(201,168,76,0.2);
            flex-shrink: 0;
        }

        .gold-text {
            background: linear-gradient(135deg, var(--gold-light), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        input {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
        }

        @keyframes moneyPop {
            0%   { transform: scale(1); }
            50%  { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
        .money-pop { animation: moneyPop 0.4s ease; }
    </style>
</head>
<body>

<div id="month-transition-overlay">
    <div class="mto-curtain-left"></div>
    <div class="mto-curtain-right"></div>
    <div class="mto-content">
        <p class="mto-tagline" id="mto-phase-label">FASE 1 · POUPADOR</p>
        <div class="mto-divider"></div>
        <div class="mto-month-label" id="mto-month-num">MÊS 2</div>
        <div class="mto-divider"></div>
        <p class="mto-tagline" style="margin-top:1rem; font-size:0.85rem;" id="mto-motto">"O tempo é o maior ativo do investidor."</p>
    </div>
</div>

<div id="screen-home" class="min-h-screen">
    <div class="home-bg-layer"></div>
    <div class="home-bg-overlay"></div>

    <div class="home-content">
        <p class="home-eyebrow">Jogo de Educação Financeira</p>
        <div class="home-gold-line"></div>
        <h1 class="home-title">CAMINHO PARA<br>A PROSPERIDADE</h1>
        <div class="home-gold-line"></div>
        <p class="home-subtitle">O mercado não espera. Nem você deveria.</p>

        <div class="city-badge-row">
            <div class="city-badge"><div style="width:100%;height:100%;background:rgba(201,168,76,0.1);"></div><span class="city-badge-label">New York</span></div>
            <div class="city-badge"><div style="width:100%;height:100%;background:rgba(201,168,76,0.1);"></div><span class="city-badge-label">Manhattan</span></div>
            <div class="city-badge"><div style="width:100%;height:100%;background:rgba(201,168,76,0.1);"></div><span class="city-badge-label">Liberty</span></div>
        </div>

        <div class="flex flex-col sm:flex-row gap-4 w-full max-w-xl mt-2">
            <button onclick="switchScreen('screen-solo')" class="btn-luxury btn-gold flex-1">▶ Jogar Sozinho</button>
            <button onclick="switchScreen('screen-create')" class="btn-luxury btn-dark flex-1">⚑ Criar Sala (Líder)</button>
            <button onclick="switchScreen('screen-join')" class="btn-luxury btn-dark flex-1">↗ Entrar na Sala</button>
        </div>
    </div>
</div>

<div id="screen-solo" class="hidden min-h-screen flex flex-col justify-center items-center p-4" style="background:var(--obsidian);">
    <div class="luxury-card p-8 w-full max-w-md relative z-10">
        <p style="font-size:0.7rem;letter-spacing:0.3em;color:var(--gold);text-transform:uppercase;margin-bottom:0.25rem;">Modo</p>
        <h2 style="font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;color:#fff;margin-bottom:1.5rem;">Solo Trader</h2>
        <div class="space-y-4">
            <div>
                <label style="font-size:0.75rem;letter-spacing:0.2em;color:rgba(255,255,255,0.5);text-transform:uppercase;display:block;margin-bottom:0.4rem;">Seu Codinome:</label>
                <input id="solo-player-name" type="text" placeholder="Ex: Íkaro" style="width:100%;padding:0.75rem 1rem;background:rgba(255,255,255,0.04);border:1px solid rgba(201,168,76,0.25);border-radius:6px;color:#fff;outline:none;">
            </div>
            <button onclick="actionStartSolo()" class="btn-luxury btn-gold" style="width:100%;margin-top:0.5rem;">Iniciar Jornada →</button>
            <button onclick="switchScreen('screen-home')" class="btn-luxury btn-dark" style="width:100%;font-size:0.85rem;">← Voltar</button>
        </div>
    </div>
</div>

        <p style="font-size:0.7rem;letter-spacing:0.3em;color:var(--gold);text-transform:uppercase;margin-bottom:0.25rem;">Multiplayer</p>
        <h2 style="font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;color:#fff;margin-bottom:1.5rem;">Criar Sala</h2>
        <div class="space-y-4">
            <div>
                <label style="font-size:0.75rem;letter-spacing:0.2em;color:rgba(255,255,255,0.5);text-transform:uppercase;display:block;margin-bottom:0.4rem;">Nome da Sala:</label>
                <input id="create-room-name" type="text" placeholder="Ex: Turma A" style="width:100%;padding:0.75rem 1rem;background:rgba(255,255,255,0.04);border:1px solid rgba(201,168,76,0.25);border-radius:6px;color:#fff;outline:none;">
            </div>
            <div>
                <label style="font-size:0.75rem;letter-spacing:0.2em;color:rgba(255,255,255,0.5);text-transform:uppercase;display:block;margin-bottom:0.4rem;">Senha (opcional):</label>
                <input id="create-room-pass" type="password" placeholder="Deixe em branco para sem senha" style="width:100%;padding:0.75rem 1rem;background:rgba(255,255,255,0.04);border:1px solid rgba(201,168,76,0.25);border-radius:6px;color:#fff;outline:none;">
            </div>
            <button onclick="actionCreateRoom()" class="btn-luxury btn-gold" style="width:100%;margin-top:0.5rem;">Criar Sala →</button>
            <button onclick="switchScreen('screen-home')" class="btn-luxury btn-dark" style="width:100%;font-size:0.85rem;">← Voltar</button>
        </div>
    </div>
</div>
